services:
  quiz:
    build: .
    image: quiz-concurso:latest
    ports:
      - "5000:5000"
    restart: unless-stopped
    environment:
      - DATA_DIR=/app/data
      - DB_KEY=${DB_KEY:-}
      - SECRET_KEY=${SECRET_KEY:-}
      - FLASK_DEBUG=0
    volumes:
      - quiz_data:/app/data

volumes:
  quiz_data:
