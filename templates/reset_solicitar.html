<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resetar Senha — Quiz Interativo</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="topbar">
  <a href="{{ url_for('login') }}" class="topbar-logo">
    <img src="{{ url_for('static', filename='logo.svg') }}" alt="">
    <span>Quiz Interativo</span>
  </a>
</div>
<div class="container">
  <div class="card">
    <h1>Resetar Senha</h1>
    {% if erro %}
    <div class="erro">{{ erro }}</div>
    {% endif %}
    {% if token %}
    <p style="text-align:center;margin-bottom:15px;color:#16a34a;">
      Token gerado: <code style="word-break:break-all;font-size:0.85rem">{{ token }}</code>
    </p>
    <p class="link">
      <a href="{{ url_for('reset_confirmar', token=token) }}">Clique aqui para redefinir a senha</a>
    </p>
    {% else %}
    <form method="POST">
      <input type="text" name="username" placeholder="Nome de usuário" required>
      <button type="submit">Gerar Token</button>
    </form>
    {% endif %}
    <p class="link"><a href="{{ url_for('login') }}">Voltar ao login</a></p>
  </div>
</div>
<div class="footer">
  <p>Feito com <span class="heart">&lt;3</span> (e Linux) por Jrockets</p>
  <p>&copy; 2026 Todos os direitos reservados</p>
</div>
</body>
</html>
