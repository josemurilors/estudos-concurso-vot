<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Quiz Interativo</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="topbar">
  <a href="{{ url_for('login') }}" class="topbar-logo">
    <img src="{{ url_for('static', filename='logo.svg') }}" alt="">
    <span>Quiz Interativo</span>
  </a>
</div>
<div class="container">
  <div class="card">
    <h1>Entrar</h1>
    {% if erro %}
    <div class="erro">{{ erro }}</div>
    {% endif %}
    <form method="POST">
      <input type="text" name="username" placeholder="Usuário" required>
      <input type="password" name="password" placeholder="Senha" required>
      <button type="submit">Entrar</button>
    </form>
    <p class="link">Não tem conta? <a href="{{ url_for('cadastro') }}">Cadastre-se</a></p>
    <p class="link" style="margin-top:5px"><a href="{{ url_for('reset_solicitar') }}">Esqueci minha senha</a></p>
  </div>
</div>
<div class="footer">
  <p>Feito com <span class="heart">&lt;3</span> (e Linux) por Jrockets</p>
  <p>&copy; 2026 Todos os direitos reservados</p>
</div>
</body>
</html>
